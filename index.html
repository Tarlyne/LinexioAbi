
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinexioAbi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background: #0a0f1d;
            --color-background-subtle: #1e293b;
            --color-ui-primary: #1e293b;
            --color-accent-primary: #06b6d4;
            --color-accent-amber: #f59e0b;
            --color-border: rgba(51, 65, 85, 0.6);
            --color-shadow: rgba(6, 182, 212, 0.25);
            --slot-height: 38px;
        }

        *, *::before, *::after {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--color-background);
            color: #f1f5f9;
        }

        /* Base Gradient for the app */
        .dashboard-gradient {
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #0a0f1d 80%);
        }

        .grid-row {
            height: var(--slot-height);
            border-bottom: 1px solid rgba(51, 65, 85, 0.6); /* Erhöhte Sichtbarkeit von 0.5 auf 0.6 */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-row-hour {
            height: var(--slot-height);
            border-bottom: 1px solid rgba(51, 65, 85, 0.85); /* Beibehalten bei 0.85 */
            background: rgba(6, 182, 212, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.125rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-width: 1px;
            white-space: nowrap;
        }
        .badge-cyan { color: var(--color-accent-primary); background: rgba(6, 182, 212, 0.1); border-color: rgba(6, 182, 212, 0.2); }
        .badge-amber { color: var(--color-accent-amber); background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); }
        .badge-slate { color: #94a3b8; background: rgba(148, 163, 184, 0.1); border-color: rgba(148, 163, 184, 0.2); }
        .badge-emerald { color: #10b981; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        .badge-red { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }

        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .aurora-glow {
            position: absolute;
            width: 130%;
            height: 130%;
            background: radial-gradient(circle at 50% 50%, var(--color-accent-primary) 0%, transparent 65%);
            filter: blur(120px);
            opacity: 0.28;
            animation: move-aurora 30s infinite alternate ease-in-out;
        }

        .aurora-glow-secondary {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #4f46e5 0%, transparent 60%);
            filter: blur(100px);
            opacity: 0.15;
            animation: move-aurora 35s infinite alternate-reverse ease-in-out;
        }

        @keyframes move-aurora {
            0% { transform: translate(-15%, -15%) rotate(0deg) scale(1); }
            50% { transform: translate(10%, 5%) rotate(10deg) scale(1.15); }
            100% { transform: translate(-5%, -10%) rotate(-5deg) scale(1); }
        }

        .glass-nocturne {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .glass-modal {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 1.5rem;
            box-shadow: 
                0 0 0 1px rgba(0,0,0,0.5),
                0 25px 60px -12px rgba(0, 0, 0, 0.9),
                0 0 80px 4px rgba(6, 182, 212, 0.22);
        }

        /* Modal Animations */
        @keyframes backdrop-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes backdrop-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.98) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modal-out {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(0.98) translateY(8px); }
        }

        .animate-backdrop-in { animation: backdrop-in 0.3s ease-out forwards; }
        .animate-backdrop-out { animation: backdrop-out 0.25s ease-in forwards; }
        .animate-modal-in { animation: modal-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-modal-out { animation: modal-out 0.2s ease-in forwards; }

        /* Unified Slim Scrollbars */
        ::-webkit-scrollbar { 
            width: 4px; 
            height: 4px; 
        }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(51, 65, 85, 0.6); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.4);
        }

        @keyframes row-exit {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.95); }
        }
        .animate-row-exit { animation: row-exit 0.3s forwards; }

        .exam-card-shadow {
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.7), 0 0 15px rgba(6, 182, 212, 0.1);
        }

        button, a, input, select {
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
    </style>

</head>

</html>
